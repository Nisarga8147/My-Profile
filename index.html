<nav class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-md shadow-sm border-b z-50">
  <div class="max-w-6xl  mx-auto flex justify-between items-center px-8 py-4">

    <!-- LOGO -->
    <h1 class="text-xl font-bold text-indigo-600 tracking-wide">
      NDC
    </h1>

    <!-- MENU -->
    <div class="flex items-center gap-8">

      <a href="#projects"
        class="nav-link">Projects</a>

      <a href="#education"
        class="nav-link">Education</a>

      <a href="#skills"
        class="nav-link">Skills</a>

      <!-- THEME BUTTON -->
      <button id="theme-btn"
        class="px-4 py-1.5 bg-indigo-600 text-white rounded-lg shadow hover:bg-indigo-700 transition">
        Theme
      </button>

    </div>
  </div>

<!-- ✅ HERO -->
<section class="min-h-screen flex items-center px-6 pt-24">

  <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-10 items-center">

    <!-- LEFT SIDE (TEXT) -->
    <div>
      <p id="greeting-message" class="text-lg  mb-2"></p>

      <h1 class="text-5xl md:text-6xl font-extrabold mb-4 leading-tight">
  Hi, I'm <span class="text-indigo-600">Nisarga DC</span>
</h1>

<p id="typing-text" class="text-lg md:text-xl text-slate-600 mb-6"></p>
      <div class="flex gap-4">
        <a href="resume.pdf" download
           class="px-6 py-2 bg-indigo-600 text-white rounded-lg shadow hover:bg-indigo-700 transition">
           Download Resume
        </a>

        <a href="#projects"
           class="px-6 py-2 border border-indigo-600 text-indigo-600 rounded-lg hover:bg-indigo-50 transition">
           View Projects
        </a>
      </div>
    </div>

    <!-- RIGHT SIDE (IMAGE) -->
    <div class="flex justify-center md:justify-end">
      <img src="myphoto.jpg"
           class="w-60 h-69 object-cover rounded-full shadow-2xl border-2 border-indigo-200">
    </div>

  </div>

</section>


</section>

<!-- ✅ PROJECTS FIRST -->
<!-- PROJECTS -->
<section id="projects" class="p-12 bg-gradient-to-r from-indigo-50 to-indigo-100">
  <h2 class="text-3xl md:text-4xl font-extrabold mb-10 text-center text-slate-800">Projects</h2>

  <!-- 🔍 SEARCH BAR -->
<div class="flex justify-center mb-8">
  <input 
    type="text" 
    id="project-search"
    placeholder="Search projects by name..."
    class="w-full max-w-md px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
  />
</div>

  <div id="projects-container"
     class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
</div>
</section>

<!-- ✅ EDUCATION -->
<!-- EDUCATION -->
<section id="education" class="p-12 bg-gradient-to-r from-emerald-50 to-emerald-100">
  <h2 class="text-3xl md:text-4xl font-extrabold mb-10 text-center text-slate-800">Education</h2>

  <div id="education-container" class="max-w-3xl mx-auto flex flex-col gap-6">
</div>
</section>

<!-- ✅ SKILLS LAST -->
<!-- SKILLS -->
<section id="skills" class="p-12 bg-gradient-to-r from-purple-50 to-purple-100">
 <h2 class="text-3xl md:text-4xl font-extrabold mb-10 text-center text-slate-800">Skills</h2>
  <div id="skills-container"
       class="flex flex-wrap justify-center gap-6">
  </div>
</section>

<!-- CONTACT BUTTON -->
<button id="contact-btn"
  class="fixed bottom-6 right-6 bg-indigo-600 text-white 
         w-14 h-14 rounded-full shadow-lg flex items-center 
         justify-center text-2xl hover:bg-indigo-700 transition z-50">

  ☏
</button>

<!-- CONTACT MODAL -->
<div id="contact-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center">

  <div class="bg-white w-96 p-6 rounded-xl shadow-xl relative">

    <!-- CLOSE BUTTON -->
    <button id="close-modal"
      class="absolute top-2 right-3 text-gray-500 text-xl">&times;</button>

    <h2 class="text-xl font-bold mb-4 text-center">Contact Me</h2>

    <form id="contact-form" class="flex flex-col gap-4">

      <input type="text" id="name"
        placeholder="Your name"
        class="border p-2 rounded">

      <input type="email" id="email"
        placeholder="email@website.com"
        class="border p-2 rounded">

      <textarea id="message"
        placeholder="Your message"
        class="border p-2 rounded"></textarea>

      <div class="flex justify-between mt-2">
        <button type="button" id="cancel-btn"
          class="px-4 py-2 bg-gray-300 rounded">
          Cancel
        </button>

        <button type="submit"
          class="px-4 py-2 bg-indigo-600 text-white rounded">
          Submit
        </button>
      </div>

    </form>

  </div>
</div>

<!-- JS FILES (ORDER MATTERS) -->
<script src="./js/data/skills.js"></script>
<script src="./js/data/projects.js"></script>
<script src="./js/data/educations.js"></script>
<script src="./js/features/dynamic-greeting.js"></script>

<script src="./js/features/project-render.js"></script>
<script src="./js/features/education-render.js"></script>
<script src="./js/features/theme-toggle.js"></script>
<script src="./js/features/contact-modal.js"></script>
<script src="./js/main.js"></script>

</body>
</html>
